services:
  - type: web
    name: mundi-tkr-sports
    env: static
    staticPublishPath: .
    branch: main
    autoDeploy: true
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
