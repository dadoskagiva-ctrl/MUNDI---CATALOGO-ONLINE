services:
  - type: web
    name: mundi-tkr-sports
    env: static
    staticPublishPath: .
    branch: main
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /sw.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icon.svg
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: mundi-tkr-api
    env: node
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: API_KEY
        value: mundi_tkr_api_2026
      - key: DATABASE_URL
        sync: false
