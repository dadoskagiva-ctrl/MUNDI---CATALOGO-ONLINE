name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:         # permite rodar manualmente se precisar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://mundi-catalogo-online-1.onrender.com/version.json
