<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  <!-- background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- MUNDI in orange (matches logo) -->
  <text x="32" y="248" font-family="Arial Black, Impact, Arial, sans-serif" font-weight="900" font-size="158" fill="#e06020" letter-spacing="-6">MUNDI</text>
  <!-- TKR in white, right-aligned offset below -->
  <text x="480" y="420" text-anchor="end" font-family="Arial Black, Impact, Arial, sans-serif" font-weight="900" font-size="158" fill="#f0ece4" letter-spacing="-4">TKR</text>
</svg>
